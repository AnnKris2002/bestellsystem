<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Nordmed Bestellsystem">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="IconNordmed.png">
  <link rel="apple-touch-icon" href="IconNordmed.png">
  <title>Nordmed Bestellsystem</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #1565C0;
      --blue-d:      #0D47A1;
      --blue-light:  #E3F2FD;
      --blue-mid:    #BBDEFB;
      --green:       #2E7D32;
      --green-light: #E8F5E9;
      --amber:       #E65100;
      --amber-light: #FFF3E0;
      --red:         #C62828;
      --border:      #BBDEFB;
      --text:        #0D2340;
      --muted:       #4A6080;
      --card:        #fff;
      --bg:          #EEF4FF;
      --sidebar-w:   220px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── LOGIN ─────────────────────────────────────────────────────── */
    #login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #0288D1 100%);
    }

    .login-box {
      background: var(--card);
      border-radius: 20px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 12px 48px rgba(13,71,161,.35);
    }

    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo img { max-width: 100%; height: auto; }

    .login-box h1 {
      font-size: 18px; font-weight: 700;
      color: var(--blue-d); text-align: center; margin-bottom: 3px;
    }
    .login-box .subtitle {
      color: var(--muted); font-size: 12px;
      text-align: center; margin-bottom: 24px;
    }

    #name-step { display: flex; flex-direction: column; gap: 8px; }

    .name-btn {
      width: 100%; padding: 13px;
      border: 2px solid var(--border); border-radius: 12px;
      background: var(--blue-light); cursor: pointer;
      font-size: 17px; font-weight: 700; color: var(--text);
      transition: border-color .15s, background .15s;
    }
    .name-btn:hover { border-color: var(--blue); background: #DBEAFE; }

    #pin-step { display: none; flex-direction: column; gap: 12px; }
    #pin-who { text-align: center; font-size: 14px; font-weight: 600; color: var(--muted); }
    #pin-dots { display: flex; justify-content: center; gap: 10px; margin: 4px 0; }
    .pin-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--border); transition: background .15s; }
    .pin-dot.filled { background: var(--blue); }
    #pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .pin-key {
      padding: 13px; border: 1.5px solid var(--border); border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 18px; font-weight: 600;
      color: var(--text); transition: background .1s; user-select: none;
    }
    .pin-key:hover { background: var(--blue-light); }
    .pin-key:active { background: var(--blue-mid); }
    .pin-key.del { color: var(--muted); font-size: 14px; }
    #pin-back {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; text-decoration: underline; text-align: center;
    }
    .err { color: var(--red); font-size: 13px; text-align: center; display: none; }

    /* ── APP ─────────────────────────────────────────────────────────── */
    #app { display: none; height: 100vh; flex-direction: column; overflow: hidden; }

    /* ── TOPBAR ─────────────────────────────────────────────────────── */
    #topbar {
      background: linear-gradient(90deg, var(--blue-d) 0%, var(--blue) 100%);
      color: #fff;
      height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(13,71,161,.3);
    }

    .topbar-title { font-size: 15px; font-weight: 700; }

    .topbar-contact {
      display: flex; gap: 14px;
      font-size: 12px; color: rgba(255,255,255,.8);
      flex: 1;
    }
    .topbar-contact span { white-space: nowrap; }

    .chip-user {
      background: rgba(255,255,255,.25);
      padding: 3px 10px; border-radius: 99px;
      font-size: 12px; font-weight: 700;
    }

    .tbtn {
      background: rgba(255,255,255,.15); border: none;
      color: #fff; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .tbtn:hover { background: rgba(255,255,255,.25); }

    /* ── LAYOUT ──────────────────────────────────────────────────────── */
    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 10px 10px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .nav-item:hover { background: var(--blue-light); }
    .nav-item.active {
      background: var(--blue-light);
      border-left-color: var(--blue);
      color: var(--blue-d);
    }

    .nav-item .nav-icon { font-size: 16px; }
    .nav-item .nav-label { flex: 1; }

    .nav-badge {
      background: var(--amber);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 99px;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* ── MAIN ────────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── KATEGORIE TABS ──────────────────────────────────────────────── */
    #cat-tabs {
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .cat-tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .cat-tab:hover { color: var(--text); }
    .cat-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── CONTENT ──────────────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 80px;
    }

    /* ── CARDS ────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(21,101,192,.07);
    }

    .card-header {
      padding: 10px 15px;
      background: var(--blue-light);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-header h2 { font-size: 14px; font-weight: 700; color: var(--blue-d); flex: 1; }

    /* ── GRUPPE ────────────────────────────────────────────────────────── */
    .gruppe-header {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 8px 15px 4px;
      background: #F8FBFF;
      border-top: 1px solid #EEF4FF;
      border-bottom: 1px solid #EEF4FF;
    }

    /* ── ARTIKEL ZEILE ─────────────────────────────────────────────────── */
    /* Spalten: Dot | Artikelname | Art.-Nr. | Einheit | Preis | Menge */
    .artikel-row {
      display: grid;
      grid-template-columns: 30px 1fr 110px 76px 72px 78px;
      align-items: stretch;
      border-bottom: 1px solid #EEF4FF;
      transition: background .1s;
    }
    .artikel-row:hover { background: #F8FBFF; }

    .artikel-row > * {
      padding: 8px 10px;
      border-right: 1px solid #EEF4FF;
      display: flex; align-items: center;
      min-width: 0;
    }
    .artikel-row > *:last-child { border-right: none; }

    /* Dot-Zelle: zentriert, kein Padding */
    .art-farbe-cell { justify-content: center; padding: 0 !important; }
    .art-farbe {
      width: 10px; height: 10px; flex-shrink: 0;
      border-radius: 50%; border: 1px solid rgba(0,0,0,.18);
    }

    /* Name: einzeilig, zu lange Namen mit … kürzen (Tooltip zeigt vollen Namen) */
    .artikel-row > .art-name {
      font-size: 13px;
      display: block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .art-nr      { font-size: 11px; color: var(--muted); }
    .art-einheit { font-size: 11px; color: var(--muted); justify-content: flex-end; }
    .art-preis   { font-size: 11px; color: var(--blue-d); justify-content: flex-end; font-weight: 600; }
    .art-preis.placeholder { color: #ccc; font-weight: 400; }
    .art-menge-cell { justify-content: center; }

    /* Sprechstundenbedarf: Preisspalte ausblenden */
    .no-preis .artikel-row      { grid-template-columns: 30px 1fr 110px 76px 78px; }
    .no-preis .art-preis        { display: none; }
    .no-preis .sonstiges-bar  { grid-template-columns: 30px 1fr 110px 76px 78px; }
    .no-preis .son-preis-cell { display: none; }

    /* Praxisbedarf: Art.-Nr.-Spalte ausblenden */
    .no-artnr .artikel-row      { grid-template-columns: 30px 1fr 76px 72px 78px; }
    .no-artnr .art-nr           { display: none; }
    .no-artnr .sonstiges-bar { grid-template-columns: 30px 1fr 76px 72px 78px; }
    .no-artnr .son-nr-cell   { display: none; }

    /* ── RECHNUNGSAUFSTELLUNG ──────────────────────────────────────── */
    .rechnung-box {
      margin: 14px 0 0;
      background: var(--blue-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .rechnung-title {
      padding: 9px 14px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }
    .rechnung-row {
      display: flex; justify-content: space-between;
      padding: 5px 14px;
      font-size: 12px;
      border-bottom: 1px solid rgba(21,101,192,.12);
    }
    .rechnung-row:last-child { border-bottom: none; }
    .rechnung-row.sub { color: var(--muted); }
    .rechnung-row.total-netto { font-weight: 600; border-top: 1px solid var(--border); }
    .rechnung-row.mwst { color: var(--muted); }
    .rechnung-row.total-brutto {
      font-weight: 700; font-size: 14px;
      background: rgba(21,101,192,.12);
      border-top: 2px solid var(--blue);
      padding: 8px 14px;
    }
    .rechnung-row.hint {
      font-size: 11px; color: var(--muted);
      font-style: italic; padding: 6px 14px;
    }

    .menge-input {
      width: 62px; padding: 5px 6px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 14px; font-weight: 700; text-align: center;
      outline: none; color: var(--text); background: #fff;
    }
    .menge-input:focus { border-color: var(--blue); }
    .menge-input.filled { border-color: var(--blue); background: var(--blue-light); color: var(--blue-d); }

    /* ── SONSTIGES ────────────────────────────────────────────────────── */
    .sonstiges-bar {
      background: #F8FBFF; border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 30px 1fr 110px 76px 72px 78px;
      align-items: center;
      padding: 6px 0 8px;
    }
    .sonstiges-bar > * { padding: 0; }
    .sonstiges-bar > *:last-child { padding-right: 10px; }

    .son-inp {
      width: 100%; box-sizing: border-box;
      padding: 5px 10px; border: 1.5px solid var(--border);
      border-radius: 7px; font-size: 11px; outline: none;
      background: #fff; color: var(--text);
    }
    .son-inp:focus { border-color: var(--blue); }
    .son-inp.son-einheit { text-align: right; }
    .son-inp.son-preis   { text-align: right; }
    .son-inp.son-menge   { text-align: center; }

    /* Pfeile aus allen Zahlenfeldern entfernen */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .son-gruppe-wrap { display: flex; align-items: center; gap: 6px; grid-column: span 2; }

    /* ── BUTTONS ───────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 15px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: opacity .15s, background .15s; white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-blue    { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: var(--blue-d); }
    .btn-save    { background: rgba(21,101,192,.45); color: var(--blue-d); }
    .btn-save:hover { background: rgba(21,101,192,.6); }
    .btn-green   { background: var(--green); color: #fff; }
    .btn-green:hover { opacity: .85; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

    /* ── ACTIONS BAR ───────────────────────────────────────────────────── */
    .actions-bar {
      position: fixed; bottom: 0;
      left: var(--sidebar-w); right: 0;
      background: #fff; border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: none; gap: 10px; align-items: center; flex-wrap: wrap;
      box-shadow: 0 -2px 10px rgba(21,101,192,.1); z-index: 40;
    }
    .actions-bar.visible { display: flex; }
    .actions-spacer { flex: 1; }
    .actions-info { font-size: 12px; color: var(--muted); }

    /* ── BADGES ────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 3px 9px;
      border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .badge-aktuell      { background: var(--amber-light); color: var(--amber); }
    .badge-bestellt     { background: var(--blue-light);  color: var(--blue-d); }
    .badge-abgeschlossen{ background: var(--green-light); color: var(--green); }

    /* ── ORDER CARDS ───────────────────────────────────────────────────── */
    .order-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 12px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(21,101,192,.07);
    }
    .order-header {
      padding: 11px 15px; background: var(--blue-light);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .order-meta { font-size: 12px; color: var(--muted); }

    /* ── CHECK ROWS ─────────────────────────────────────────────────────── */
    .check-row {
      display: flex; align-items: center;
      padding: 8px 15px; gap: 12px;
      border-bottom: 1px solid #F4F8FF;
    }
    .check-row:last-child { border-bottom: none; }
    .check-row.done .cr-name { text-decoration: line-through; color: var(--muted); }
    .check-row input[type=checkbox] {
      width: 18px; height: 18px; cursor: pointer;
      accent-color: var(--blue); flex-shrink: 0;
    }
    .cr-name  { flex: 1; font-size: 13px; }
    .cr-menge { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .cr-by    { font-size: 11px; color: var(--green); white-space: nowrap; flex: 0 0 42px; text-align: right; }

    /* ── ARCHIV ─────────────────────────────────────────────────────────── */
    .archiv-section-title {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 14px 4px 6px;
    }

    /* ── INFO BANNER ────────────────────────────────────────────────────── */
    .info-banner {
      background: var(--blue-light); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
      font-size: 13px; color: var(--blue-d);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── LOADING / EMPTY ────────────────────────────────────────────────── */
    .loading { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty .icon { font-size: 42px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── TOAST ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 68px; left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--blue-d); color: #fff;
      padding: 10px 22px; border-radius: 99px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .3s, transform .3s;
      z-index: 999; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PRINT ──────────────────────────────────────────────────────────── */
    @media print {
      #topbar, #sidebar, #cat-tabs, .actions-bar,
      .sonstiges-bar, .btn, #toast { display: none !important; }
      body { background: #fff; }
      #content { padding: 0; }
      .card { border: 1px solid #ccc; box-shadow: none; margin-bottom: 12px; }
      .card-header { background: #f0f0f0; }
    }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      :root { --sidebar-w: 0px; }
      #sidebar { display: none; }
      .actions-bar { left: 0; }
      .art-nr { display: none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────── -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">
      <img src="Logo_PGmitKranOhneNamen.png" alt="Praxisgemeinschaft am Rostocker Stadthafen">
    </div>
    <h1>Nordmed Bestellsystem</h1>
    <p class="subtitle">Medizinisches Labor Rostock</p>

    <div id="name-step"></div>
    <div id="pin-step">
      <div id="pin-who"></div>
      <div id="pin-dots"></div>
      <div id="pin-pad"></div>
      <div class="err" id="pin-err">PIN falsch — bitte nochmal versuchen.</div>
      <button id="pin-back" onclick="backToNames()">← Andere Person wählen</button>
    </div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <span class="topbar-title">Nordmed Bestellsystem</span>
    <div class="topbar-contact">
      <span>📞 0381 / 702 2170</span>
      <span>📠 0381 / 702 2179</span>
    </div>
    <span class="chip-user" id="chip-user"></span>
    <button class="tbtn" onclick="doLogout()">Abmelden</button>
  </div>

  <!-- LAYOUT -->
  <div id="layout">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-section">Bestellungen</div>

      <div class="nav-item active" data-view="bestellung" onclick="switchView('bestellung')">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Bestellung</span>
      </div>

      <div class="nav-item" data-view="bestellt" onclick="switchView('bestellt')">
        <span class="nav-icon">📬</span>
        <span class="nav-label">Bestellt</span>
        <span class="nav-badge" id="badge-bestellt" style="display:none"></span>
      </div>

      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Verlauf</div>

      <div class="nav-item" data-view="archiv" onclick="switchView('archiv')">
        <span class="nav-icon">📁</span>
        <span class="nav-label">Archiv</span>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main">

      <!-- Kategorie-Tabs (nur bei Bestellung) -->
      <div id="cat-tabs" style="display:none">
        <div class="cat-tab active" data-cat="labor"        onclick="switchCat('labor')">🧪 Laborbedarf</div>
        <div class="cat-tab"       data-cat="praxis"       onclick="switchCat('praxis')">🏥 Praxisbedarf</div>
        <div class="cat-tab"       data-cat="sprechstunde" onclick="switchCat('sprechstunde')">📋 Sprechstundenbedarf</div>
      </div>

      <!-- Content -->
      <div id="content">
        <div id="view-bestellung"></div>
        <div id="view-bestellt"   style="display:none"></div>
        <div id="view-archiv"     style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Aktionsleiste -->
  <div class="actions-bar" id="actions-bar">
    <span class="actions-info" id="actions-info"></span>
    <div class="actions-spacer"></div>
    <button class="btn btn-save"    onclick="saveOrder()">💾 Speichern</button>
    <button class="btn btn-blue"    onclick="submitOrder()">📬 Bestellen →</button>
  </div>

</div>

<div id="toast"></div>

<script>

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function buildLoginUI() {
  const ns = document.getElementById('name-step');
  ns.innerHTML = '';
  allStaff.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'name-btn';
    btn.textContent = s.anzeigename;
    btn.onclick = () => showPinStep(s);
    ns.appendChild(btn);
  });

  const pad  = document.getElementById('pin-pad');
  const dots = document.getElementById('pin-dots');
  for (let i = 0; i < 6; i++) {
    const d = document.createElement('div'); d.className = 'pin-dot'; dots.appendChild(d);
  }
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k => {
    if (k === '') { pad.appendChild(document.createElement('div')); return; }
    const btn = document.createElement('button');
    btn.className = 'pin-key' + (k === '⌫' ? ' del' : '');
    btn.textContent = k;
    btn.onclick = () => pinKey(String(k));
    pad.appendChild(btn);
  });
}

function showPinStep(staff) {
  selectedStaff = staff; pinBuffer = ''; updateDots();
  document.getElementById('pin-who').textContent = 'PIN für ' + staff.anzeigename;
  document.getElementById('pin-err').style.display = 'none';
  document.getElementById('name-step').style.display = 'none';
  document.getElementById('pin-step').style.display = 'flex';
}

function backToNames() {
  pinBuffer = ''; selectedStaff = null;
  document.getElementById('pin-step').style.display = 'none';
  document.getElementById('name-step').style.display = 'flex';
  document.getElementById('pin-err').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pin-step').style.display !== 'flex') return;
  if (e.key >= '0' && e.key <= '9') pinKey(e.key);
  else if (e.key === 'Backspace') pinKey('⌫');
});

function pinKey(k) {
  if (k === '⌫') { pinBuffer = pinBuffer.slice(0,-1); updateDots(); return; }
  if (pinBuffer.length >= 6) return;
  pinBuffer += k; updateDots();
  if (pinBuffer.length === 6) setTimeout(doLogin, 120);
}

function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) =>
    d.classList.toggle('filled', i < pinBuffer.length));
}

async function doLogin() {
  if (!selectedStaff || pinBuffer.length < 6) return;
  document.getElementById('pin-err').style.display = 'none';
  const pin = pinBuffer; pinBuffer = ''; updateDots();
  const { error } = await db.auth.signInWithPassword({ email: selectedStaff.email, password: pin });
  if (error) { document.getElementById('pin-err').style.display = 'block'; }
  else { currentUser = selectedStaff; await showApp(); }
}

async function doLogout() {
  await db.auth.signOut(); currentUser = null; showLogin();
}

function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display   = 'none';
  document.getElementById('pin-step').style.display = 'none';
  document.getElementById('name-step').style.display = 'flex';

}

async function showApp() {

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.view === view));
  ['bestellung','bestellt','archiv'].forEach(v =>
    document.getElementById('view-' + v).style.display = v === view ? '' : 'none');

  const catTabs = document.getElementById('cat-tabs');
  const actionsBar = document.getElementById('actions-bar');

  if (view === 'bestellung') {
    catTabs.style.display = 'flex';
    actionsBar.classList.add('visible');
    loadBestellungView();
  } else {
    catTabs.style.display = 'none';
    actionsBar.classList.remove('visible');
    if (view === 'bestellt') loadBestelltView();
    if (view === 'archiv')   loadArchivView();
  }
}

function flushCurrentCatToSavedQtys() {
  document.querySelectorAll('.menge-input[data-id]').forEach(inp => {
    const menge = parseInt(inp.value) || 0;
    if (menge > 0) savedQtys[inp.dataset.id] = menge;
    else delete savedQtys[inp.dataset.id];
  });
}

function switchCat(cat) {
  flushCurrentCatToSavedQtys();
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.cat === cat));
  renderCurrentCat();
}

// ─── BESTELLUNG VIEW ──────────────────────────────────────────────────────────
async function loadBestellungView() {
  const view = document.getElementById('view-bestellung');
  view.innerHTML = '<div class="loading">Lade Artikel…</div>';

  const { data: artData } = await db.from('bestell_artikel')
    .select('*').eq('aktiv', true).order('sort_order');
  articles = artData || [];

  const { data: orderData } = await db.from('bestell_auftraege')
    .select('*').eq('status', 'aktuell')
    .order('erstellt_am', { ascending: false }).limit(1);
  currentOrder = orderData?.[0] || null;

  savedQtys = {}; savedSonstiges = [];
  if (currentOrder) {
    const { data: posData } = await db.from('bestell_positionen')
      .select('*').eq('auftrag_id', currentOrder.id);
    (posData || []).forEach(p => {
      if (p.artikel_id) savedQtys[p.artikel_id] = p.menge;
      else savedSonstiges.push(p);
    });
  }

  renderCurrentCat();
}

function renderSonRowHtml(s, cat, filled) {
  const preis = (parseFloat(s.preis_netto)||0) > 0
    ? `<div class="art-preis">${parseFloat(s.preis_netto).toFixed(2).replace('.',',')} €</div>`
    : cat !== 'sprechstunde' ? `<div class="art-preis"></div>` : `<div class="art-preis"></div>`;
  return `<div class="artikel-row">
    <div class="art-farbe-cell"><div class="art-farbe" style="background:#ddd"></div></div>
    <div class="art-name" title="${esc(s.name)}">${esc(s.name)}</div>
    <div class="art-nr">${esc(s.artikelnummer || '')}</div>
    <div class="art-einheit">${esc(s.einheit)}</div>
    ${preis}
    <div class="art-menge-cell" style="gap:3px">
      <input type="number" min="0" step="1" placeholder="0"
        class="menge-input${filled}" value="${s.menge || ''}"
        data-sonid="${s.id}"
        oninput="onQtyInput(this)"
        onchange="updateSonstigesMenge('${s.id}', this)">
    </div>
  </div>`;
}

      : cat === 'sprechstunde'
      ? /* Sprechstunde: kein Preis → Selector in Art.-Nr.-Spalte, Button über Einheit+Menge */
        `<div></div>
         <div style="text-align:right;font-size:12px;color:var(--blue);padding-right:8px;white-space:nowrap">Kategoriegruppe</div>

         <div style="grid-column:span 2"><select id="son-gruppe-${cat}" class="son-inp" style="font-size:12px">

  html += `</div>`;

function farbenStyle(farbe) {
  const m = {
    'weiß':'background:#fff','rot':'background:#E53935','grün':'background:#43A047',
    'blau':'background:#1E88E5','gelb':'background:#FDD835','schwarz':'background:#212121',
    'orange':'background:#FB8C00','braun':'background:#6D4C41','lila':'background:#8E24AA',
    'grau':'background:#9E9E9E','malve':'background:#EC407A','transparent':'background:rgba(0,0,0,.05)',
    'hellblau':'background:#81D4FA','dunkelrot':'background:#B71C1C',
    'beige':'background:#D7CCC8','hellgrau':'background:#BDBDBD','rosa':'background:#F48FB1',
  };
  return (m[farbe] || 'background:#eee') + ';';
}

function onQtyInput(inp) {
  inp.classList.toggle('filled', (parseInt(inp.value) || 0) > 0);
  updateActionsInfo();
}

function updateActionsInfo() {
  let count = 0;
  document.querySelectorAll('.menge-input[data-id]').forEach(inp => {
    if ((parseInt(inp.value) || 0) > 0) count++;
  });
  // Zähle auch Sonstiges mit Menge > 0
  count += savedSonstiges.filter(s => (s.menge || 0) > 0).length;
  const el = document.getElementById('actions-info');
  if (el) el.textContent = count > 0 ? `${count} Artikel ausgewählt` : '';
}

// ─── POSITIONEN SAMMELN ───────────────────────────────────────────────────────
function collectPositions() {
  flushCurrentCatToSavedQtys();
  const pos = [];
  articles.forEach(art => {
    const menge = savedQtys[art.id] || 0;
    if (menge <= 0) return;
    pos.push({
      artikel_id: art.id, kategorie: art.kategorie,
      gruppe: art.gruppe, name: art.name,
      artikelnummer: art.artikelnummer || '', einheit: art.einheit || 'Stück',
      preis_netto: parseFloat(art.preis_netto) || 0, menge,
    });
  });
  return pos;
}

// ─── DRUCKEN ──────────────────────────────────────────────────────────────────
async function imgToBase64(url) {
  const resp = await fetch(url);
  const blob = await resp.blob();
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

// ─── SPEICHERN ────────────────────────────────────────────────────────────────
async function saveOrder(silent = false) {
  const positions = collectPositions();

  if (!currentOrder && positions.length === 0 && savedSonstiges.length === 0) {
    if (!silent) showToast('Bitte zuerst Mengen eintragen.');
    return false;
  }

  if (!currentOrder) {
    const { data, error } = await db.from('bestell_auftraege').insert({
      status: 'aktuell', erstellt_von: currentUser.anzeigename,
    }).select().single();
    if (error) { showToast('⚠️ Fehler beim Speichern.'); return false; }
    currentOrder = data;
  }

  await db.from('bestell_positionen')
    .delete().eq('auftrag_id', currentOrder.id).not('artikel_id', 'is', null);

  if (positions.length > 0) {
    const rows = positions.map(p => ({ ...p, auftrag_id: currentOrder.id }));
    const { error } = await db.from('bestell_positionen').insert(rows);
    if (error) { showToast('⚠️ Fehler beim Speichern.'); return false; }
  }

  savedQtys = {};
  positions.forEach(p => { savedQtys[p.artikel_id] = p.menge; });

  if (!silent) showToast('✅ Gespeichert.');
  return true;
}

// ─── BESTELLEN ────────────────────────────────────────────────────────────────
async function submitOrder() {
  const positions = collectPositions();
  const total = positions.length + savedSonstiges.length;
  if (total === 0) { showToast('Keine Artikel ausgewählt.'); return; }
  if (!confirm(`${total} Artikel bestellen?`)) return;

  const ok = await saveOrder(true);
  if (!ok || !currentOrder) return;

  const { error } = await db.from('bestell_auftraege').update({
    status: 'bestellt', bestellt_von: currentUser.anzeigename,
    bestellt_am: new Date().toISOString(),
  }).eq('id', currentOrder.id);

  if (error) { showToast('⚠️ Fehler beim Absenden.'); return; }

  showToast('✅ Bestellung abgesendet!');
  await printOrder();
  currentOrder = null; savedQtys = {}; savedSonstiges = [];
  await updateBestelltBadge();
  loadBestellungView();
}

// ─── SONSTIGES ────────────────────────────────────────────────────────────────
async function addSonstiges(kat) {
  const nameEl    = document.getElementById(`son-name-${kat}`);
  const nrEl      = document.getElementById(`son-nr-${kat}`);
  const einheitEl = document.getElementById(`son-einheit-${kat}`);
  const preisEl   = document.getElementById(`son-preis-${kat}`);
  const mengeEl   = document.getElementById(`son-menge-${kat}`);
  const gruppeEl  = document.getElementById(`son-gruppe-${kat}`);
  const name    = nameEl.value.trim();
  const nr      = nrEl?.value.trim() || '';
  const einheit = einheitEl?.value.trim() || 'Stück';
  const preis_netto = parseFloat((preisEl?.value || '').replace(',', '.')) || 0;
  const menge   = parseInt(mengeEl.value) || 0;
  const gruppe  = gruppeEl?.value || 'Sonstiges';
  if (!name)    { showToast('Bitte Artikelname eingeben.'); return; }
  if (menge < 1){ showToast('Bitte Menge eingeben.'); return; }

  // Artikel dauerhaft in bestell_artikel anlegen
  const maxSort = Math.max(0, ...articles.filter(a => a.kategorie === kat).map(a => a.sort_order || 0));
  const { data: newArt, error: artErr } = await db.from('bestell_artikel').insert({
    kategorie: kat, gruppe, name, artikelnummer: nr,
    einheit, preis_netto, aktiv: true, sort_order: maxSort + 1,
  }).select().single();
  if (artErr) { showToast('⚠️ Fehler beim Anlegen des Artikels.'); return; }

  // Menge für diese Bestellung vormerken
  articles.push(newArt);
  savedQtys[newArt.id] = menge;

  nameEl.value = '';
  if (nrEl) nrEl.value = '';
  if (einheitEl) einheitEl.value = '';
  if (preisEl) preisEl.value = '';
  mengeEl.value = '';
  showToast(`✅ "${name}" dauerhaft hinzugefügt.`);
  renderCurrentCat();
  updateActionsInfo();
}

async function updateSonstigesMenge(posId, inp) {
  const menge = parseInt(inp.value) || 0;
  const s = savedSonstiges.find(x => x.id === posId);
  if (s) s.menge = menge;
  await db.from('bestell_positionen').update({ menge }).eq('id', posId);
}

async function deleteSonstiges(posId) {
  if (!confirm('Diesen Artikel entfernen?')) return;
  await db.from('bestell_positionen').delete().eq('id', posId);
  showToast('Artikel entfernt.');
  loadBestellungView();
}

// ─── BESTELLT VIEW ────────────────────────────────────────────────────────────
async function loadBestelltView() {
  const view = document.getElementById('view-bestellt');
  view.innerHTML = '<div class="loading">Lade Bestellungen…</div>';

  const { data: orders } = await db.from('bestell_auftraege')
    .select('*, bestell_positionen(*)')
    .eq('status', 'bestellt')
    .order('bestellt_am', { ascending: false });

  if (!orders || orders.length === 0) {
    view.innerHTML = `<div class="empty"><div class="icon">📬</div><p>Keine offenen Bestellungen.</p></div>`;
    return;
  }

  const CATS = [
    { key:'labor', label:'🧪 Labor' },
    { key:'praxis', label:'🏥 Praxis' },
    { key:'sprechstunde', label:'📋 Sprechstundenbedarf' },
  ];

  let html = '';
  orders.forEach(order => {
    const items   = order.bestell_positionen || [];
    const done    = items.filter(i => i.erhalten).length;
    const allDone = items.length > 0 && done === items.length;

    html += `<div class="order-card">
      <div class="order-header">
        <span class="badge badge-bestellt">Bestellt</span>
        <span style="font-size:13px;font-weight:600">${fmtDate(order.bestellt_am)}</span>
        <span class="order-meta">von ${esc(order.bestellt_von || '')}</span>
        <span class="order-meta" style="margin-left:auto">${done}/${items.length} erhalten</span>
        ${allDone ? `<button class="btn btn-green" style="font-size:12px;padding:6px 12px" onclick="completeOrder('${order.id}')">✓ Abschließen</button>` : ''}
      </div>`;

    CATS.forEach(cat => {
      const ci = items.filter(i => i.kategorie === cat.key);
      if (!ci.length) return;
      html += `<div class="gruppe-header">${cat.label}</div>`;
      ci.forEach(item => {
        const doneClass = item.erhalten ? ' done' : '';
        const byText    = item.erhalten ? `✓ ${item.erhalten_von || ''}` : '';
        const preis     = parseFloat(item.preis_netto) || 0;
        const posTotal  = preis > 0 ? (item.menge * preis).toFixed(2).replace('.',',') + ' €' : '';
        html += `<div class="check-row${doneClass}">
          <span class="cr-name">${esc(item.name)}
            ${item.artikelnummer ? `<span style="color:var(--muted);font-size:11px"> ${esc(item.artikelnummer)}</span>` : ''}
          </span>
          <span class="cr-menge">${item.menge}× ${esc(item.einheit)}</span>
          ${posTotal ? `<span style="font-size:11px;color:var(--blue-d);min-width:72px;text-align:right">${posTotal}</span>` : '<span style="min-width:72px"></span>'}
          <span class="cr-by">${byText}</span>
          <input type="checkbox" ${item.erhalten ? 'checked' : ''}
            onchange="toggleErhalten('${item.id}', '${order.id}', this.checked)">
        </div>`;
      });
    });

    // ── Rechnungsaufstellung (nur Labor + Praxis) ──────────────────
    const hasLabor  = items.some(i => i.kategorie === 'labor');
    const rechnItems = items.filter(i => i.kategorie !== 'sprechstunde' && (parseFloat(i.preis_netto)||0) > 0);
    if (rechnItems.length > 0 || hasLabor) {
      const laborItems  = rechnItems.filter(i => i.kategorie === 'labor');
      const praxisItems = rechnItems.filter(i => i.kategorie === 'praxis');
      const sumLabor  = laborItems.reduce( (s,i) => s + i.menge * (parseFloat(i.preis_netto)||0), 0);
      const sumPraxis = praxisItems.reduce((s,i) => s + i.menge * (parseFloat(i.preis_netto)||0), 0);
      const sumNetto  = sumLabor + sumPraxis;
      const mwst      = sumNetto * 0.19;
      const sumBrutto = sumNetto + mwst;
      const fmt = v => v.toFixed(2).replace('.',',') + ' €';

      html += `<div class="rechnung-box">
        <div class="rechnung-title">🧾 Rechnungsaufstellung (Netto-Preise)</div>`;
      if (hasLabor)      html += `<div class="rechnung-row sub"><span>🧪 Laborbedarf</span><span style="color:${sumLabor > 0 ? 'inherit' : 'var(--muted)'}">${sumLabor > 0 ? fmt(sumLabor) : 'Preise folgen'}</span></div>`;
      if (sumPraxis > 0) html += `<div class="rechnung-row sub"><span>🏥 Praxisbedarf</span><span>${fmt(sumPraxis)}</span></div>`;
      html += `<div class="rechnung-row total-netto"><span>Summe Netto</span><span>${fmt(sumNetto)}</span></div>
        <div class="rechnung-row mwst"><span>+ 19 % MwSt.</span><span>${fmt(mwst)}</span></div>
        <div class="rechnung-row total-brutto"><span>Gesamt Brutto</span><span>${fmt(sumBrutto)}</span></div>
        <div class="rechnung-row hint">Sprechstundenbedarf wird über KV-Rezept abgerechnet und erscheint hier nicht.</div>
      </div>`;
    }

    html += `</div>`;
  });

  view.innerHTML = html;
}

async function toggleErhalten(posId, orderId, checked) {
  const updates = checked
    ? { erhalten: true,  erhalten_von: currentUser.kuerzel, erhalten_am: new Date().toISOString() }
    : { erhalten: false, erhalten_von: null, erhalten_am: null };
  await db.from('bestell_positionen').update(updates).eq('id', posId);
  loadBestelltView();
}

async function completeOrder(orderId) {
  if (!confirm('Bestellung vollständig erhalten — jetzt abschließen?')) return;
  await db.from('bestell_auftraege').update({
    status: 'abgeschlossen',
    abgeschlossen_von: currentUser.anzeigename,
    abgeschlossen_am: new Date().toISOString(),
  }).eq('id', orderId);
  showToast('✅ Bestellung abgeschlossen!');
  await updateBestelltBadge();
  loadBestelltView();
}

async function updateBestelltBadge() {
  const { count } = await db.from('bestell_auftraege')
    .select('*', { count: 'exact', head: true }).eq('status', 'bestellt');
  const badge = document.getElementById('badge-bestellt');
  if (!badge) return;
  if (count && count > 0) { badge.textContent = count; badge.style.display = ''; }
  else badge.style.display = 'none';
}

// ─── ARCHIV VIEW ──────────────────────────────────────────────────────────────
async function loadArchivView() {
  const view = document.getElementById('view-archiv');
  view.innerHTML = '<div class="loading">Lade Archiv…</div>';

  const { data: orders } = await db.from('bestell_auftraege')
    .select('*, bestell_positionen(*)')
    .eq('status', 'abgeschlossen')
    .order('abgeschlossen_am', { ascending: false });

  if (!orders || orders.length === 0) {
    view.innerHTML = `<div class="empty"><div class="icon">📁</div><p>Noch keine abgeschlossenen Bestellungen.</p></div>`;
    return;
  }

  const grouped = {};
  orders.forEach(o => {
    const d = new Date(o.abgeschlossen_am);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
    if (!grouped[key]) grouped[key] = { label, orders: [] };
    grouped[key].orders.push(o);
  });

  const CATS = [
    { key:'labor', label:'🧪 Labor' },
    { key:'praxis', label:'🏥 Praxis' },
    { key:'sprechstunde', label:'📋 Sprechstundenbedarf' },
  ];

  let html = '';
  Object.keys(grouped).sort().reverse().forEach(key => {
    const g = grouped[key];
    html += `<div class="archiv-section-title">${g.label} — ${g.orders.length} Bestellung${g.orders.length!==1?'en':''}</div>`;
    g.orders.forEach(order => {
      const items = order.bestell_positionen || [];
      html += `<div class="order-card">
        <div class="order-header" style="cursor:pointer" onclick="toggleArchiv('a-${order.id}')">
          <span class="badge badge-abgeschlossen">Abgeschlossen</span>
          <span style="font-size:13px;font-weight:600">${fmtDateFull(order.abgeschlossen_am)}</span>
          <span class="order-meta">${esc(order.abgeschlossen_von||'')}</span>
          <span class="order-meta" style="margin-left:auto">${items.length} Positionen ▾</span>
        </div>
        <div id="a-${order.id}" style="display:none">`;
      CATS.forEach(cat => {
        const ci = items.filter(i => i.kategorie === cat.key);
        if (!ci.length) return;
        html += `<div class="gruppe-header">${cat.label}</div>`;
        ci.forEach(item => {
          html += `<div class="check-row done">
            <span style="color:var(--green);font-size:14px">✓</span>
            <span class="cr-name">${esc(item.name)}</span>
            <span class="cr-menge">${item.menge}× ${esc(item.einheit)}</span>
            <span class="cr-by">${esc(item.erhalten_von||'')}</span>
          </div>`;
        });
      });
      html += `</div></div>`;
    });
  });

  view.innerHTML = html;
}

function toggleArchiv(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

// ─── HELFER ───────────────────────────────────────────────────────────────────
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3500);
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})
    + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function fmtDateFull(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('de-DE',
    {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
